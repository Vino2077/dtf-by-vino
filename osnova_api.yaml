openapi: "3.0.1"
info:
  version: 2.31.0
  title: "Osnova API"
  description: >-
    Открытая документация API для [vc.ru](//vc.ru), [DTF](//dtf.ru) и [TJ](//tjournal.ru). В данной версии доступны не все методы, нужно комбинировать запросы с версией [1.9](../v1/swagger.html).

    ## Ограничения API ##

    * Не чаще 3-х запросов к API в секунду

    * Существуют также отдельные ограничения на отправку комментариев, лайков и др.

    ## Заголовки (headers) ##

    При запросе к API необходимо передавать поле `User-agent` в формате `{app_name}-app/{app_version}; {app_build_type} ({device_name}; {os_name}/{os_version}; {locale}; {screen_height}x{screen_width})`. Например: `dtf-app/2.2.0; release (Pixel 2; Android/9; ru_RU; 1980x1794)`.


    Некоторые запросы доступны только для авторизованных пользователей (методы обозначены замком). Для этого необходимо передавать авторизационный токен `X-Device-Token` в заголовке запроса, он возвращается с сервера при авторизации.


    Срок действия токена - 3 месяца, нужно обновлять через метод `auth/refresh-token` со refresh токеном `X-Refresh-Token`, который живет 1 год и отдается вместе с авторизационным в заголовке.


    Для доступа к тестовым серверам необходимо поле `Authorization` (доступно только для разработчиков Комитета).

    ## Авторизация по API-токену

    Как авторизоваться в API используя специальный токен со страницы настроек пользователя

    1. Зайти в [свой профиль](https://tjournal.ru/u/me/settings)

    2. Справа нажать на ссылку «Инструменты для разработчика»

    3. Вы увидите токен, с которым можно обращаться к API

        [https://www.notion.so/dd3f2ae5a4bc4a7fbeb4598f86eb37aa#7734c1a41c834da5b7425eac905f39ba](https://www.notion.so/dd3f2ae5a4bc4a7fbeb4598f86eb37aa#7734c1a41c834da5b7425eac905f39ba)

    4. Можно использовать этот токен для отправки запросов к API от имени вашего аккаунта

    ## WebSocket IO ##

    Адреса серверов: `https://ws-sio.dtf.ru`, `https://ws-sio.vc.ru`, `https://ws-sio.tjournal.ru`

    Подключение к каналам или отключение реализуется через `emit` событий `subscribe/unsubscribe` c JSON объекта вида `{"channel": "%channel_name%"}`. Например: `{"channel": "feed"}`.

    Список каналов:

    - `mobile:{userHash из SubsiteAuthorizedUser}` - личный канал авторизованного пользователя для уведомлений. Например: `mobile:dd3f2ae5a4bc4a7fbeb4598f86eb37aa`

      Типы событий:

        - `4` - лайк комментария

        - `8` - новый комментарий к записи

        - `16` - ответ на комментарий

        - `32` - пользователя упомянули в комментарии

        - `64` - подсайт опубликовал новую запись

      Каждое уведомление содержит поле `textParts`, чтобы сообщение можно было собрать на стороне клиента в зависимости от языковых установок.

    - `m:{mHash из SubsiteAuthorizedUser}` - личный канал авторизованного пользователя для мессенджера вида `m:dd3f2ae5a4bc4a7fbeb4598f86eb37aa`

      Типы событий:

        - `messenger_event` - событие от мессенджера

      Типы action:

        - `addMessage` - новое сообщение

        - `typing` - пользователь печатает

        - `messagesRemoved` - сообщения удалены

        - `markAsRead` - канал прочитано до указанного момента

    - `api` - информация об изменениях контента на сайте

      Типы событий:

        - `content voted` - лайк записи

        - `new_entry_published` - опубликована новая запись

    - `content-hits-mobile-{id записи}` - информация о количестве просмотров текущей записи. Например: `content-hits-mobile-1234`

      Типы событий:

        - `content viewed` - новое количество просмотров записи

    - `api:comments-{id записи}` - информация о комментариях текущей записи. Например: `api:comments-1234`

      Типы событий:

        - `comment voted` - лайк комментария

        - `comment_created` - создан новый комментарий

        - `comment_edited` - отредактирован комментарий

    - `online` - статусы онлайна у пользователей

      Типы событий:

        - `user_turned_online` - пользователь онлайн

  termsOfService: "https://tjournal.ru/terms"
  contact:
    name: "KMTT Developers"
    url: "https://cmtt.ru"
    email: "support@cmtt.ru"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"
servers:
  - url: https://api.dtf.ru/v{version}
    description: Production server
    variables:
      version:
        enum:
          - '2.31'
        default: '2.31'
  - url: https://api.tjournal.ru/v{version}
    description: Production server
    variables:
      version:
        enum:
          - '2.31'
        default: '2.31'
  - url: https://api.vc.ru/v{version}
    description: Production server
    variables:
      version:
        enum:
          - '2.31'
        default: '2.31'
paths:
  /bookmarks:
    get:
      tags:
        - Bookmarks
      description: Избранное
      operationId: getBookmarks
      security:
        - XDeviceToken: [ ]
      parameters:
        - name: type
          in: query
          description: Фильтр избранного
          required: true
          schema:
            type: string
            format: string
            enum:
              - all
              - posts
              - jobs
              - events
              - comments
        - name: count
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Bookmarks result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/BookmarksItem'
  /favorite:
    post:
      tags:
        - Content
      description: Добавить контент в избранное
      operationId: postFavorite
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                id:
                  type: integer
                  format: int64
                  example: 1234
                type:
                  type: integer
                  format: int64
                  example: 1
                  description: >
                    Тип контента:
                       * `1` - запись
                       * `2` - комментарий
                       * `3` - подсайт
                  enum:
                    - 1
                    - 2
                    - 3
      responses:
        '200':
          description: Fave result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      success:
                        type: boolean
                      count:
                        type: integer
                  message:
                    type: string
  /unfavorite:
    post:
      tags:
        - Content
      description: Удалить контент из избранного
      operationId: postUnfavorite
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                content_id:
                  type: integer
                  format: int64
                  example: 1234
                type:
                  type: integer
                  format: int64
                  example: 1
                  description: >
                    Тип контента:
                       * `1` - запись
                       * `2` - комментарий
                       * `3` - подсайт
                  enum:
                    - 1
                    - 2
                    - 3
      responses:
        '200':
          description: Unfave result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      success:
                        type: boolean
                      count:
                        type: integer
                  message:
                    type: string
  /repost/create:
    post:
      tags:
        - Timeline
      description: Сделать репост записи
      operationId: postRepostCreate
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                content_id:
                  description: Id записи
                  type: integer
                  format: int64
                  example: 1234
                subsite_id:
                  description: Id подсайта
                  type: integer
                  format: int64
                  example: 1234
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      result:
                        type: boolean
                      count:
                        type: integer
                      mine_count:
                        type: integer
                      subsite_name:
                        type: string
                  message:
                    type: string
  /repost/remove:
    post:
      tags:
        - Timeline
      description: Удалить репост записи
      operationId: postRepostRemove
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                content_id:
                  description: Id записи
                  type: integer
                  format: int64
                  example: 1234
                subsite_id:
                  description: Id подсайта
                  type: integer
                  format: int64
                  example: 1234
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      result:
                        type: boolean
                      count:
                        type: integer
                      mine_count:
                        type: integer
                      subsite_name:
                        type: string
                  message:
                    type: string
  /subsite/setisadult:
    post:
      tags:
        - Subsite
      description: Подтвердить возраст 18+
      operationId: postSubsiteSetisadult
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                is_adult:
                  description: Пользователь взрослый да/нет
                  type: boolean
                  example: false
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      is_adult:
                        type: boolean
                  message:
                    type: string
  /subsite/update:
    post:
      tags:
        - Subsite
      description: Изменение настроек подсайта
      operationId: postSubsiteUpdate
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                subsiteId:
                  required: true
                  description: Id подсайта
                  type: integer
                  format: int64
                  example: 1234
                description:
                  description: Описание профиля
                  type: string
                  example: Test description
                is_blur_nsfw:
                  description: Вкл/выкл блюрить записи 18+
                  type: boolean
                  example: false
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      description:
                        type: string
                      is_blur_nsfw:
                        type: boolean
                  message:
                    type: string
  /subsite/name/change:
    post:
      tags:
        - Subsite
      description: Изменение названия подсайта. Можно делать раз в три месяца.
      operationId: postSubsiteNameChange
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                subsiteId:
                  required: true
                  description: Id подсайта
                  type: integer
                  format: int64
                  example: 1234
                name:
                  required: true
                  description: Название подсайта
                  type: string
                  example: Subsite name
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      name:
                        type: string
                      result:
                        type: boolean
                  message:
                    type: string
  /auth/refresh-token:
    post:
      tags:
        - Auth
      description: Обновить токен авторизации. Новый токен возвращается в X-Auth-Token
      operationId: postAuthRefreshToken
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                refreshToken:
                  description: refresh токен из Subsite
                  type: string
                  example: dfgd57sd89989bixm5cf3dfe4vgjfds5fnfea45
      responses:
        '200':
          description: Ответ игнорируется, X-Refresh-Token отдается в заголовке
  /repost/getsubsites:
    get:
      tags:
        - Timeline
      description: Получить список подсайтов, куда можно делать репост
      operationId: getRepostGetsubsites
      security:
        - XDeviceToken: [ ]
      parameters:
        - name: content_id
          in: query
          required: true
          description: Id записи для репоста
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      result:
                        type: boolean
                      count:
                        type: integer
                      mine_count:
                        type: integer
                      subsite_name:
                        type: string
                  message:
                    type: string
  /content:
    get:
      tags:
        - Content
      description: Получить контент по Id
      operationId: getContent
      parameters:
        - name: id
          in: query
          required: true
          description: Id записи
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Entry result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: '#/components/schemas/Entry'
                  message:
                    type: string
  /news:
    get:
      tags:
        - Timeline
      description: Список новостей
      operationId: getNews
      parameters:
        - name: lastId
          in: query
          required: false
          description: Id последней записи. Необходимо для пагинации
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      news:
                        type: array
                        items:
                          $ref: '#/components/schemas/Entry'
                      lastId:
                        type: number
                        description: ID последнего элемента для подгрузки
                        example: 23102
                  message:
                    type: string
  /news/min:
    get:
      tags:
        - Timeline
      description: Короткий список новостей (для системного виджета)
      operationId: getNewsMin
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Entry'
                  message:
                    type: string
  /subsite/me:
    get:
      tags:
        - Subsite
      description: Информация об авторизованном пользователе
      operationId: getSubsiteMe
      security:
        - XDeviceToken: [ ]
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: '#/components/schemas/SubsiteAuthorizedUser'
                  message:
                    type: string
  /subsite:
    get:
      tags:
        - Subsite
      description: Информация о подсайте/пользователе
      operationId: getSubsite
      parameters:
        - name: id
          in: query
          required: true
          description: Id подсайта
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: '#/components/schemas/Subsite'
                  message:
                    type: string
  /subsite/subscribers:
    get:
      tags:
        - Subsite
      description: Список подписчиков подсайта
      operationId: getSubsiteSubscribers
      parameters:
        - name: subsiteId
          in: query
          required: true
          description: Id подсайта
          schema:
            type: integer
            format: int64
        - name: lastId
          in: query
          required: false
          description: Значение lastId из предыдущего запроса
          schema:
            type: integer
            format: int64
        - name: lastSortingValue
          in: query
          required: false
          description: Значение lastSortingValue из предыдущего запроса
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Subsite'
                      lastId:
                        type: number
                      lastSortingValue:
                        type: number
                  message:
                    type: string
  /subsite/subscriptions:
    get:
      tags:
        - Subsite
      description: Список подписок подсайта
      operationId: getSubsiteSubscriptions
      parameters:
        - name: subsiteId
          in: query
          required: true
          description: Id подсайта
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          description: Значение nextPage из предыдущего запроса
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Subsite'
                      nextPage:
                        type: number
                      total:
                        type: number
                  message:
                    type: string
  /subsite/votes:
    get:
      tags:
        - Subsite
      description: Список оценок пользователя
      operationId: getSubsiteVotes
      security:
        - XDeviceToken: [ ]
      parameters:
        - name: subsiteId
          in: query
          required: true
          description: Id подсайта
          schema:
            type: integer
            format: int64
        - name: vote
          in: query
          required: false
          example: positive
          description: >
            Тип оценки
             * Пустое значение - Все
             * `positive` - Позитивные
             * `negative` - Отрицательные
          schema:
            type: string
            format: string
        - name: type
          in: query
          required: false
          example: entries
          description: >
            Тип контента:
             * `entries` - Записи
          schema:
            type: string
            format: string
        - name: lastId
          in: query
          required: false
          description: Значение lastId из предыдущего запроса
          schema:
            type: integer
            format: int64
        - name: lastSortingValue
          in: query
          required: false
          description: Значение lastSortingValue из предыдущего запроса
          schema:
            type: string
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Entry'
                      lastId:
                        type: number
                      lastSortingValue:
                        type: number
                  message:
                    type: string
  /subsite/credentials:
    get:
      tags:
        - Subsite
      description: Список реквизитов для входа
      operationId: getSubsiteCredentials
      security:
        - XDeviceToken: [ ]
      responses:
        '200':
          description: Osnova result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      credentials:
                        type: array
                        items:
                          properties:
                            type:
                              description: >
                                Тип метода входа в аккаунт:
                                  * `twitter` - Twitter
                                  * `vk` - Vkontake
                                  * `facebook` - Facebook
                                  * `apple` - Apple
                                  * `password` - Email
                                  * `google` - Google
                              type: string
                            id:
                              type: string
                            name:
                              type: string
                            url:
                              type: string
                            login:
                              type: string
                  message:
                    type: string
  /donates/addCard:
    post:
      tags:
        - Donates
      description: Привязка карты
      security:
        - XDeviceToken: [ ]
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Сообщение
                  result:
                    type: object
                    properties:
                      url:
                        type: string
                        description: Ссылка на форму прикрепления карты
  /donates:
    get:
      tags:
        - Donates
      description: Получение списка донатов (вместе с выводами)
      security:
        - XDeviceToken: [ ]
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Сообщение
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Donate'

  /donates/form:
    get:
      tags:
        - Donates
      description: Получение формы вывода денег
      security:
        - XDeviceToken: [ ]
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalWithdrawalAmount:
                    type: number
                    description: Сколько денег получит пользователь
                  totalRevenueAmount:
                    type: number
                    description: Сколько заработает Комитет

  /donates/withdraw:
    post:
      tags:
        - Donates
      description: Вывод денег
      security:
        - XDeviceToken: [ ]
      responses:
        '200':
          description: Успешный ответ

  /comments/add:
    post:
      tags:
        - Comment
      description: Создание комментария
      security:
        - XDeviceToken: [ ]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                id:
                  description: Идентификатор статьи
                  type: integer
                  required: true
                text:
                  description: Текст комментария
                  type: string
                  required: true
