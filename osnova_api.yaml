  /feed:
    get:
      tags:
        - Timeline
      description: Главная лента записей
      operationId: getFeed
      parameters:
        - name: pageName
          in: query
          required: false
          description: >
            Название ленты:
              * `popular` - популярное всего сайта
              * `new` - свежее всего сайта
              * `my` - собственная лента пользователя с учетом подписок
          schema:
            type: string
            enum:
              - popular
              - new
              - my
          example: popular
        - name: sorting
          in: query
          required: false
          description: >
            Тип сортировки для pageName = `popular`:
              * `hotness` - по популярности
              * `day` - свежее за день
              * `week` - свежее за неделю
              * `month` - свежее месяц
              * `year` - свежее за год
              * `all` - свежее за все время

            Тип сортировки для pageName = `new`:
              * `from-10` - записи с рейтингом от -10
              * `from5` - записи с рейтингом от 5
              * `from10` - записи с рейтингом от 10
              * `all` - свежее с любым рейтингом

            Тип сортировки для pageName = `my`:
              * `hotness` - по популярности
              * `new` - по дате
          schema:
            type: string
            format: string
            enum:
              - hotness
              - day
              - week
              - month
              - year
              - all
              - from-10
              - from5
              - from10
              - new
          example: 'hotness'
        - name: lastId
          in: query
          required: false
          description: Значение lastId из предыдущего запроса
          schema:
            type: integer
            format: int64
        - name: lastSortingValue
          in: query
          required: false
          description: Значение lastSortingValue из предыдущего запроса
          schema:
            type: integer
            format: int64
        - name: excludeIds
          in: query
          required: false
          description: Список id записей, которые нужно скрыть из ленты
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          description: Timeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/TimelineItem'
                      lastId:
                        type: number
                      lastSortingValue:
                        type: number
                  message:
                    type: string
  /timeline:
    get:
      tags:
        - Timeline
      description: >
        Лента записей.


        UPD: Раньше использовался для отображения главной ленты, теперь он заменен роутом /feed.
      operationId: getTimeline
      parameters:
        - name: allSite
          in: query
          required: false
          description: >
            Варианты:
              * `ВКЛ` - Показать ленту всего сайта (Deprecated)
              * `ВЫКЛ` -  Показать ленту только указанных подсайтов в subsitesIds или личную ленту пользователя
          schema:
            type: boolean
          example: true
        - name: sorting
          in: query
          required: false
          description: >
            Тип сортировки:
              * `hotness` - по популярности
              * `date` - свежее
              * `day` - свежее за день
              * `week` - свежее за неделю
              * `month` - свежее месяц
              * `year` - свежее за год
              * `all` - свежее за все время
          schema:
            type: string
            format: string
            enum:
              - hotness
              - date
              - day
              - week
              - month
              - year
              - all
          example: 'date'
        - name: subsitesIds
          in: query
          required: false
          description: Id подсайтов через запятую, которые нужно включить в ленту
          schema:
            type: string
          example: 1, 2
        - name: hashtag
          in: query
          required: false
          description: Показать записи только с указанным хештегом
          schema:
            type: string
          example: игры
        - name: lastId
          in: query
          required: false
          description: Значение lastId из предыдущего запроса
          schema:
            type: integer
            format: int64
        - name: lastSortingValue
          in: query
          required: false
          description: Значение lastSortingValue из предыдущего запроса
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Timeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/TimelineItem'
                      lastId:
                        type: number
                      lastSortingValue:
                        type: number
                  message:
                    type: string
